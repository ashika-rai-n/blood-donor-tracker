<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blood Request | Donor Tracker</title>
    <link rel="stylesheet" href="style.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

    <header class="dashboard-header">
        <div class="header-left">
            <a href="dashboard.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
        </div>
        <div class="header-right">
            <a href="auth.html" class="btn-splash-nav">Logout</a>
        </div>
    </header>

    <main class="dashboard-main">
        <div id="blood-request-content" class="panel-content active" style="display: block; padding: 0;">

            <h2 class="section-title">🚨 Send Blood Request</h2>
            <p>Select an option to send your blood request.</p>

            <div class="request-toggle-btns">
                <button id="toggle-request-enrolled" class="req-toggle-btn active">1. Use Enrolled Details</button>
                <button id="toggle-request-manual" class="req-toggle-btn">2. Enter New Details</button>
            </div>

            <div id="enrolled-details-view" class="request-view-card active">
                <form id="enrolled-request-form">
                    <div class="form-grid">
                        <div class="input-group"><label>Requester Name:</label><input type="text" id="req-enrolled-name" disabled></div>
                        <div class="input-group"><label>Required Blood Group:</label><input type="text" id="req-enrolled-type" disabled></div>
                    </div>
                    <div class="form-grid">
                        <div class="input-group"><label>Contact Phone:</label><input type="text" id="req-enrolled-phone" disabled></div>
                    </div>
                    <div class="form-grid">
                        <div class="input-group"><label>City:</label><input type="text" id="req-enrolled-city" disabled></div>
                        <div class="input-group"><label>Area:</label><input type="text" id="req-enrolled-area" disabled></div>
                    </div>
                    <div class="input-group">
                        <label>Pincode:</label><input type="text" id="req-enrolled-pincode" disabled>
                    </div>
                    <button type="submit" class="btn-primary auth-submit-btn">Send Request (Enrolled)</button>
                </form>
            </div>

            <div id="manual-details-view" class="request-view-card" style="display:none;">
                <form id="manual-request-form">
                    <div class="form-grid">
                         <div class="input-group"><label for="req-manual-name">Requester Name:</label><input type="text" id="req-manual-name" ></div>
                        <div class="input-group">
                            <label for="req-manual-type">Required Blood Group:</label>
                            <select id="req-manual-type" required>
                                <option value="">-- Select Group --</option>
                                <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="AB+">AB+</option>
                                <option value="AB-">AB-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-grid">
                        <div class="input-group"><label for="req-manual-city">City:</label><input type="text" id="req-manual-city" ></div>
                        <div class="input-group"><label for="req-manual-area">Area:</label><input type="text" id="req-manual-area" ></div>
                    </div>
                    <div class="form-grid">
                        <div class="input-group"><label for="req-manual-phone">Contact Phone:</label><input type="text" id="req-manual-phone" placeholder="+91XXXXXXXXXX"></div>
                    </div>
                    <div class="input-group">
                        <label for="req-manual-pincode">Pincode:</label><input type="text" id="req-manual-pincode" >
                    </div>
                    <button type="submit" class="btn-primary auth-submit-btn">Send Request (Manual)</button>
                </form>
            </div>

            <div id="unified-results-sheet" class="results-card" style="display:none;">
                <h3 class="section-title">🔍 Donor Match Results</h3>
                <div id="request-status-message" class="status-message"></div>
                
                <div class="table-scroll-container">
                    <table id="unified-donor-table">
                        <thead>
                            <tr>
                                <th>Sl. No.</th>
                                <th>Name</th>
                                <th>Blood Group</th>
                                <th>Address (City, Area, Pincode)</th>
                                <th>Match Reason</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="unified-donors-body">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="dashboard-footer">
        &copy; 2025 Blood Donor Tracker. All rights reserved.
    </footer>
    
    <script src="script.js"></script>
    <script src="blood-request.js"></script>
</body>
</html>
